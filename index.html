<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bragante Agro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a3d1d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-ir-racao {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: #2e7d32; color: white; padding: 25px 8px;
            border-radius: 15px 0 0 15px; cursor: pointer; z-index: 99999;
            writing-mode: vertical-rl; text-orientation: mixed;
            text-transform: uppercase; font-size: 11px; font-weight: bold;
            border: none; box-shadow: -4px 0 12px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 8px;
        }

        #btn-voltar-pedidos {
            display: none; position: fixed; top: 20px; left: 15px;
            z-index: 100000; background: #0a3d1d; color: #ffffff;
            width: 45px; height: 45px; border-radius: 8px; border: none;
            font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer; align-items: center; justify-content: center;
        }

        #tela-racao { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99998; background: white; }
    </style>
</head>
<body>

    <button id="btn-ir-racao" onclick="abrirRacao()"><span>🌽 FORMULAR RAÇÃO</span></button>
    <button id="btn-voltar-pedidos" onclick="fecharRacao()">⬅</button>

    <iframe id="main-frame" src="BackupSistemaDefinitivo.html"></iframe>

    <div id="tela-racao">
        <iframe id="iframe-racao" src=""></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCiQh8MEy5SlPCkS8psN0EQ59W2PLKXo8s",
            authDomain: "bragante-agro.firebaseapp.com",
            databaseURL: "https://bragante-agro-default-rtdb.firebaseio.com",
            projectId: "bragante-agro",
            storageBucket: "bragante-agro.firebasestorage.app",
            messagingSenderId: "445413217691",
            appId: "1:445413217691:web:e9b37451c2689a007e7d3e"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            firebase.database().ref().keepSynced(true);
        }

        function abrirRacao() {
            const iframe = document.getElementById('iframe-racao');
            if(iframe.src === "" || iframe.src === window.location.href) iframe.src = "FormularioRacaoDefinitivo.html";
            document.getElementById('tela-racao').style.display = 'block';
            document.getElementById('btn-voltar-pedidos').style.display = 'flex';
            document.getElementById('btn-ir-racao').style.display = 'none';
        }

        function fecharRacao() {
            document.getElementById('tela-racao').style.display = 'none';
            document.getElementById('btn-voltar-pedidos').style.display = 'none';
            document.getElementById('btn-ir-racao').style.display = 'flex';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Erro PWA', err));
            });
        }
    </script>
</body>
</html>
