<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bragante Agro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --verde-escuro: #0a3d1d;
            --verde-claro: #2e7d32;
            --vermelho-alerta: #c62828;
            --cinza-pendente: #94a3b8;
            --neutro-bg: #f1f5f9;
            --neutro-borda: #cbd5e1;
            --texto-principal: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--neutro-bg); margin: 0; padding: 0; color: var(--texto-principal); display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; } 
        .app-container { width: 100%; max-width: 500px; background-color: #f8fafc; min-height: 100vh; padding: 15px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; }
        .header .bragante { color: var(--verde-escuro); }
        .header .agro { color: var(--verde-claro); }
        
        .card { background: #ffffff; padding: 16px; border-radius: 10px; border: 1px solid var(--neutro-borda); margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: 700; color: var(--verde-escuro); text-transform: uppercase; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .col-data { flex: 0 0 125px; }
        .col-cliente { flex: 1; }
        label { display: block; font-size: 10px; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--neutro-borda); font-size: 14px; box-sizing: border-box; }
        
        .grid-prod { display: grid; grid-template-columns: 2fr 1fr 1fr 30px; gap: 8px; margin-bottom: 8px; align-items: center; }
        button { cursor: pointer; border-radius: 6px; font-weight: 600; border: none; }
        .btn-main { background: var(--verde-escuro); color: white; padding: 14px; width: 100%; margin-top: 10px; }
        .btn-add { background: transparent; color: var(--verde-claro); border: 1px dashed var(--verde-claro); padding: 9px; width: 100%; margin-bottom: 10px; }
        
        .btn-nav-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .btn-nav { background: #64748b; color: white; padding: 12px 5px; font-size: 8.5px; }
        .btn-nav.active { background: var(--verde-escuro); border: 2px solid var(--verde-claro); }
        
        .btn-report { background: #94a3b8; color: white; padding: 15px; width: 100%; margin-bottom: 20px; font-size: 13px; }
        
        .pedido-item { background: white; padding: 14px; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--neutro-borda); position: relative; border-left: 6px solid #94a3b8; }
        .actions { display: flex; gap: 6px; margin-top: 12px; }
        .btn-mini { flex: 1; padding: 10px; font-size: 10px; background: #f8fafc; border: 1px solid var(--neutro-borda); }
        .btn-active-delivery { background: var(--verde-claro) !important; color: white !important; }
        .btn-active-pay { background: #1e40af !important; color: white !important; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:20px; border-radius:12px; width:90%; max-width: 300px; text-align: center; }

        /* Estilo Exclusivo de Impressão */
        #print-section { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body onclick="solicitarPermissaoNotificacao()">

    <div class="app-container no-print">
        <div class="header">
            <h1><span class="bragante">BRAGANTE</span> <span class="agro">AGRO</span></h1>
        </div>

        <div class="card">
            <div class="section-title">NOVO PEDIDO</div>
            <div class="form-row">
                <div class="col-data"><label>Data</label><input type="date" id="data"></div>
                <div class="col-cliente">
                    <label>Cliente</label>
                    <select id="cliente" onchange="verificarNovoCliente(this)">
                        <option value="">Selecione...</option>
                        <option value="NOVO_CLIENTE">+ NOVO CLIENTE...</option>
                    </select>
                </div>
            </div>
            <div id="container-produtos"></div>
            <button class="btn-add" onclick="adicionarLinhaProduto()">+ Adicionar Item</button>
            <textarea id="descricao" rows="2" placeholder="Observações..."></textarea>
            <input type="hidden" id="edit-id">
            <button class="btn-main" onclick="salvarPedido()">SALVAR PEDIDO</button>
            <button id="btn-cancelar" onclick="cancelarEdicao()" style="display:none; width:100%; margin-top:5px; padding:10px;">CANCELAR</button>
        </div>

        <div class="btn-nav-group">
            <button id="nav-entregas" class="btn-nav active" onclick="mudarModo('entregas')">ENTREGAS</button>
            <button id="nav-pagamentos" class="btn-nav" onclick="mudarModo('pagamentos')">PAGAMENTOS</button>
            <button id="nav-todos" class="btn-nav" onclick="mudarModo('todos')">TODOS</button>
        </div>
        
        <!-- BOTÃO COM FUNÇÃO CORRIGIDA -->
        <button class="btn-report" onclick="gerarRelatorio()">IMPRIMIR RELATÓRIO</button>

        <div id="listaPedidos"></div>
    </div>

    <div id="modalPagamento" class="modal">
        <div class="modal-content">
            <h3>Pagamento</h3>
            <button onclick="selecionarForma('Pix')" class="btn-main" style="background:#14b8a6">PIX</button><br>
            <button onclick="selecionarForma('Dinheiro')" class="btn-main" style="background:#22c55e">DINHEIRO</button><br>
            <button onclick="fecharModal()" style="margin-top:10px; background:none;">FECHAR</button>
        </div>
    </div>

    <div id="print-section"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCiQh8MEy5SlPCkS8psN0EQ59W2PLKXo8s",
            authDomain: "bragante-agro.firebaseapp.com",
            databaseURL: "https://bragante-agro-default-rtdb.firebaseio.com",
            projectId: "bragante-agro",
            storageBucket: "bragante-agro.firebasestorage.app",
            messagingSenderId: "445413217691",
            appId: "1:445413217691:web:e9b37451c2689a007e7d3e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let todosPedidos = [], listaProdutosBase = [], modoAtual = 'entregas', pedidoEmPagamento = null, contadorProdutos = 0;

        // Carregar Produtos
        db.ref('configuracoes/produtos').on('value', snap => {
            listaProdutosBase = [];
            snap.forEach(c => { listaProdutosBase.push(c.val()); });
            atualizarClientes();
        });

        function adicionarLinhaProduto(p="", q=1, v="") {
            contadorProdutos++;
            const div = document.createElement('div');
            div.className = 'grid-prod'; div.id = `linha-${contadorProdutos}`;
            let oP = `<option value="">Produto...</option>` + listaProdutosBase.map(item => `<option value="${item}" ${item===p?'selected':''}>${item}</option>`).join('');
            div.innerHTML = `<select id="prod-${contadorProdutos}">${oP}</select><input type="number" id="qtd-${contadorProdutos}" value="${q}"><input type="number" id="preco-${contadorProdutos}" value="${v}" step="0.01" placeholder="R$"><button onclick="this.parentElement.remove()" style="color:red; background:none;">×</button>`;
            document.getElementById('container-produtos').appendChild(div);
        }

        function salvarPedido() {
            const id = document.getElementById('edit-id').value;
            const cliente = document.getElementById('cliente').value;
            const data = document.getElementById('data').value;
            if(!cliente || !data) return alert("Preencha tudo");

            let itens = [], total = 0;
            document.querySelectorAll('.grid-prod').forEach(l => {
                const idN = l.id.split('-')[1];
                const p = document.getElementById(`prod-${idN}`).value;
                if(p){
                    const q = parseInt(document.getElementById(`qtd-${idN}`).value) || 0;
                    const v = parseFloat(document.getElementById(`preco-${idN}`).value) || 0;
                    itens.push({produto:p, qtd:q, preco:v});
                    total += (q*v);
                }
            });

            const dados = { data, cliente, itens, total, timestamp: Date.now() };
            if(id) {
                db.ref('pedidos/'+id).update(dados).then(() => cancelarEdicao());
            } else {
                const newId = db.ref('pedidos').push().key;
                db.ref('pedidos/'+newId).set({...dados, id:newId, entrega:'Pendente', pagamento:'Pendente'});
                cancelarEdicao();
            }
        }

        db.ref('pedidos').on('value', snap => {
            todosPedidos = [];
            snap.forEach(c => { todosPedidos.push(c.val()); });
            todosPedidos.sort((a,b) => b.timestamp - a.timestamp);
            listarPedidos();
            atualizarClientes();
        });

        function listarPedidos() {
            const lista = document.getElementById('listaPedidos');
            lista.innerHTML = "";
            const filtrados = todosPedidos.filter(p => {
                if(modoAtual === 'entregas') return p.entrega === 'Pendente';
                if(modoAtual === 'pagamentos') return p.pagamento === 'Pendente';
                return true;
            });

            filtrados.forEach(p => {
                const ent = p.entrega === 'Entregue';
                const pag = p.pagamento === 'Pago';
                lista.innerHTML += `
                    <div class="pedido-item" style="border-left-color: ${ent ? (pag ? '#2e7d32' : '#c62828') : '#94a3b8'}">
                        <strong>${p.cliente}</strong> - ${p.data}<br>
                        <small>${(p.itens||[]).map(i => i.qtd+'x '+i.produto).join(', ')}</small><br>
                        <strong>R$ ${p.total.toFixed(2)}</strong>
                        <div class="actions">
                            <button class="btn-mini" onclick="prepararEdicao('${p.id}')">EDITAR</button>
                            <button class="btn-mini ${ent?'btn-active-delivery':''}" onclick="statusEntrega('${p.id}')">ENTREGA</button>
                            <button class="btn-mini ${pag?'btn-active-pay':''}" onclick="abrirPgto('${p.id}')">PAGAR</button>
                        </div>
                    </div>`;
            });
        }

        // FUNÇÃO DE RELATÓRIO CORRIGIDA
        function gerarRelatorio() {
            const filtrados = todosPedidos.filter(p => {
                if(modoAtual === 'entregas') return p.entrega === 'Pendente';
                if(modoAtual === 'pagamentos') return p.pagamento === 'Pendente';
                return true;
            });

            if(filtrados.length === 0) return alert("Nada para imprimir");

            let totalGeral = 0;
            let conteudo = `<div style="padding:20px; font-family:Arial;">
                <h2 style="text-align:center;">BRAGANTE AGRO - RELATÓRIO</h2>
                <p style="text-align:center;">Modo: ${modoAtual.toUpperCase()} | Data: ${new Date().toLocaleDateString()}</p><hr>`;

            filtrados.forEach(p => {
                conteudo += `<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <strong>${p.cliente}</strong> (${p.data.split('-').reverse().join('/')})<br>`;
                p.itens.forEach(i => {
                    const sub = i.qtd * i.preco;
                    totalGeral += sub;
                    conteudo += `<span style="margin-left:15px;">• ${i.qtd}x ${i.produto} - R$ ${sub.toFixed(2)}</span><br>`;
                });
                conteudo += `</div>`;
            });

            conteudo += `<hr><h3 style="text-align:right;">TOTAL GERAL: R$ ${totalGeral.toFixed(2)}</h3></div>`;

            const container = document.getElementById('print-section');
            container.innerHTML = conteudo;

            // Força o navegador a renderizar e depois abre a impressão
            setTimeout(() => {
                window.print();
            }, 300);
        }

        function statusEntrega(id) { 
            const p = todosPedidos.find(x=>x.id===id);
            db.ref('pedidos/'+id).update({entrega: p.entrega === 'Entregue' ? 'Pendente' : 'Entregue'});
        }
        function abrirPgto(id) { pedidoEmPagamento = id; document.getElementById('modalPagamento').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }
        function selecionarForma(f) { 
            db.ref('pedidos/'+pedidoEmPagamento).update({pagamento:'Pago', formaPg:f}); 
            fecharModal(); 
        }

        function mudarModo(m) {
            modoAtual = m;
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-'+m).classList.add('active');
            listarPedidos();
        }

        function cancelarEdicao() {
            document.getElementById('edit-id').value = "";
            document.getElementById('container-produtos').innerHTML = "";
            document.getElementById('btn-cancelar').style.display = "none";
            adicionarLinhaProduto();
        }

        function prepararEdicao(id) {
            const p = todosPedidos.find(x=>x.id===id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('cliente').value = p.cliente;
            document.getElementById('data').value = p.data;
            document.getElementById('container-produtos').innerHTML = "";
            p.itens.forEach(i => adicionarLinhaProduto(i.produto, i.qtd, i.preco));
            document.getElementById('btn-cancelar').style.display = "block";
            window.scrollTo(0,0);
        }

        function atualizarClientes() {
            const sel = document.getElementById('cliente');
            const atual = sel.value;
            const cSet = new Set(); todosPedidos.forEach(p => cSet.add(p.cliente));
            sel.innerHTML = '<option value="">Selecione...</option><option value="NOVO_CLIENTE">+ NOVO CLIENTE...</option>';
            [...cSet].sort().forEach(c => { sel.innerHTML += `<option value="${c}" ${c===atual?'selected':''}>${c}</option>`; });
        }

        function verificarNovoCliente(s) {
            if(s.value === "NOVO_CLIENTE") {
                const n = prompt("Nome do Cliente:");
                if(n) {
                    const o = document.createElement("option"); o.value = n; o.text = n; o.selected = true;
                    s.add(o);
                } else s.value = "";
            }
        }

        function solicitarPermissaoNotificacao() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
        }

        document.getElementById('data').valueAsDate = new Date();
        adicionarLinhaProduto();
    </script>
</body>
</html>
