<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabela de Preços - Bragante Agro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --verde-escuro: #0a3d1d; --verde-claro: #2e7d32; --neutro-bg: #f1f5f9; --neutro-borda: #cbd5e1; --vermelho: #c62828; }
        body { font-family: 'Inter', sans-serif; background-color: var(--neutro-bg); margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; background: #f8fafc; min-height: 95vh; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 5px; }
        .header h1 { margin: 0; font-size: 20px; text-transform: uppercase; }
        .header .bragante { color: var(--verde-escuro); }
        .header .agro { color: var(--verde-claro); }
        .title-container { border-top: 1px solid var(--neutro-borda); margin-top: 12px; padding: 12px 0; text-align: center; position: relative; }
        .form-title { font-family: 'Montserrat', sans-serif; font-size: 13px; color: var(--verde-escuro); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
        .btn-plus { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background: var(--verde-escuro); color: white; border: none; border-radius: 6px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #status-admin { font-size: 10px; font-weight: bold; color: var(--verde-claro); display: none; text-align: center; margin-bottom: 8px; background: #e8f5e9; padding: 5px; border-radius: 5px; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--neutro-borda); margin-bottom: 12px; font-size: 14px; box-sizing: border-box; }
        .cat-wrapper { display: flex; align-items: center; justify-content: space-between; margin: 15px 0 5px; }
        .categoria-label { font-size: 10px; font-weight: 900; color: var(--verde-claro); background: #e8f5e9; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .card { background: white; border-radius: 8px; border: 1px solid var(--neutro-borda); overflow: hidden; margin-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        .item-info b { font-size: 11px; text-transform: uppercase; color: #334155; }
        .item-info span { color: var(--verde-claro); font-weight: 800; font-size: 14px; display: block; }
        .actions { display: none; gap: 8px; }
        .btn-action { background: #f1f5f9; border: 1px solid var(--neutro-borda); cursor: pointer; font-size: 14px; padding: 5px; border-radius: 4px; }
        .admin-section { display: none; background: white; padding: 15px; border: 2px solid var(--verde-claro); border-radius: 10px; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid var(--neutro-borda); box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--verde-escuro); color: white; width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-print { width: 100%; background: #64748b; color: white; padding: 12px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        @media print { .btn-plus, .actions, .admin-section, .search-box, .btn-del-cat, #status-admin, .btn-print { display: none !important; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1><span class="bragante">BRAGANTE</span> <span class="agro">AGRO</span></h1>
        <p style="font-size: 8px; color: #64748b; font-weight: bold; text-transform: uppercase;">Estância São Francisco do Balsamo</p>
    </div>

    <div id="status-admin">MODO EDIÇÃO ATIVO <button onclick="logoutAdmin()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; margin-left:10px;">[SAIR]</button></div>

    <div class="title-container">
        <div class="form-title">TABELA DE PREÇOS</div>
        <button class="btn-plus" onclick="validarAcesso()">+</button>
    </div>

    <input type="text" id="inputBusca" class="search-box" placeholder="🔎 Buscar produto..." onkeyup="processarRenderizacao()">
    <div id="lista-organizada">Carregando dados...</div>
    <button class="btn-print" onclick="window.print()">🖨️ IMPRIMIR / PDF</button>

    <div id="admin-panel" class="admin-section">
        <input type="hidden" id="edit-id">
        <input type="text" id="nome-prod" placeholder="NOME DO PRODUTO">
        <input type="number" id="preco-prod" placeholder="VALOR R$" step="0.01">
        <input type="text" id="cat-prod" placeholder="CATEGORIA" list="sugestoes-cat">
        <datalist id="sugestoes-cat"></datalist>
        <button class="btn-save" onclick="salvarItem()">SALVAR</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; background:none; border:none; color:gray; font-size:10px; margin-top:10px;">CANCELAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiQh8MEy5SlPCkS8psN0EQ59W2PLKXo8s",
        authDomain: "bragante-agro.firebaseapp.com",
        databaseURL: "https://bragante-agro-default-rtdb.firebaseio.com",
        projectId: "bragante-agro",
        storageBucket: "bragante-agro.firebasestorage.app",
        messagingSenderId: "445413217691",
        appId: "1:445413217691:web:e9b37451c2689a007e7d3e"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Tenta ativar persistência offline do Firebase
    db.app.database().setPersistenceEnabled(true).catch(() => console.log("Persistência Firebase aguardando."));

    let sessaoAdmin = false;
    let listaProdutosGlobal = [];

    function normalizar(texto) { return texto ? texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

    // --- LÓGICA DE CACHE LOCAL (ESTRATÉGIA DE SEGURANÇA) ---
    function salvarNoCacheLocal(dados) {
        localStorage.setItem('cache_precos_bragante', JSON.stringify(dados));
    }

    function carregarDoCacheLocal() {
        const salvo = localStorage.getItem('cache_precos_bragante');
        if (salvo) {
            listaProdutosGlobal = JSON.parse(salvo);
            processarRenderizacao();
        }
    }

    function processarRenderizacao() {
        const busca = normalizar(document.getElementById('inputBusca').value);
        const container = document.getElementById('lista-organizada');
        container.innerHTML = "";

        const produtosFiltrados = listaProdutosGlobal.filter(p => 
            normalizar(p.nome).includes(busca) || normalizar(p.categoria || "").includes(busca)
        );

        const categorias = [...new Set(produtosFiltrados.map(p => p.categoria || "GERAL"))].sort();

        categorias.forEach(cat => {
            const displayDelCat = (sessaoAdmin && cat !== "GERAL") ? 'inline' : 'none';
            let html = `<div class="cat-wrapper"><span class="categoria-label">${cat}</span></div><div class="card">`;
            
            produtosFiltrados.filter(p => (p.categoria || "GERAL") === cat).forEach(p => {
                const displayActions = sessaoAdmin ? 'flex' : 'none';
                html += `
                    <div class="item-row">
                        <div class="item-info"><b>${p.nome}</b><span>R$ ${parseFloat(p.preco).toFixed(2)}</span></div>
                        <div class="actions" style="display:${displayActions}">
                            <button class="btn-action" onclick="editarItem('${p.id}','${p.nome}','${p.preco}','${p.categoria}')">✏️</button>
                            <button class="btn-action" onclick="removerItem('${p.id}')">❌</button>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    // Carrega do celular ANTES de tentar o Firebase
    carregarDoCacheLocal();

    // Sincroniza com Firebase e atualiza o Cache
    db.ref('configuracoes/tabela_precos').on('value', (snap) => {
        const novosDados = [];
        snap.forEach(s => { 
            let p = s.val(); 
            p.id = s.key; 
            novosDados.push(p); 
        });
        listaProdutosGlobal = novosDados;
        salvarNoCacheLocal(novosDados); // Atualiza o backup do celular
        processarRenderizacao();
    });

    // Manutenção das funções administrativas
    function validarAcesso() {
        if(sessaoAdmin) { document.getElementById('admin-panel').style.display='block'; return; }
        if(prompt("Senha:") === "1030") {
            sessaoAdmin = true;
            document.getElementById('status-admin').style.display = 'block';
            processarRenderizacao();
        }
    }

    function logoutAdmin() { sessaoAdmin = false; document.getElementById('status-admin').style.display = 'none'; processarRenderizacao(); }

    function salvarItem() {
        const id = document.getElementById('edit-id').value;
        const dados = {
            nome: document.getElementById('nome-prod').value.trim().toUpperCase(),
            preco: parseFloat(document.getElementById('preco-prod').value),
            categoria: document.getElementById('cat-prod').value.trim().toUpperCase() || "GERAL"
        };
        if (id) db.ref('configuracoes/tabela_precos/' + id).update(dados).then(() => fecharAdmin());
        else db.ref('configuracoes/tabela_precos').push(dados).then(() => fecharAdmin());
    }

    function editarItem(id, n, p, c) {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('edit-id').value = id;
        document.getElementById('nome-prod').value = n;
        document.getElementById('preco-prod').value = p;
        document.getElementById('cat-prod').value = (c !== "undefined" ? c : "GERAL");
    }

    function removerItem(id) { if(confirm("Excluir item?")) db.ref('configuracoes/tabela_precos/' + id).remove(); }
    function fecharAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
</script>
</body>
</html>
