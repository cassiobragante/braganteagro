<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiQh8MEy5SlPCkS8psN0EQ59W2PLKXo8s",
        authDomain: "bragante-agro.firebaseapp.com",
        databaseURL: "https://bragante-agro-default-rtdb.firebaseio.com",
        projectId: "bragante-agro",
        storageBucket: "bragante-agro.firebasestorage.app",
        messagingSenderId: "445413217691",
        appId: "1:445413217691:web:e9b37451c2689a007e7d3e"
    };

    // Inicialização com tratamento de persistência
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        // Ativação explícita com tratamento de erro
        firebase.database().setPersistenceEnabled(true)
            .catch(err => console.warn("Erro de persistência (provavelmente múltiplas abas):", err));
    }

    const db = firebase.database();
    const refPrecos = db.ref('configuracoes/tabela_precos');
    
    // Força o nó de preços a estar sempre disponível no disco
    refPrecos.keepSynced(true);

    let sessaoAdmin = false;

    function normalizar(texto) {
        return texto ? texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
    }

    function renderLista() {
        const busca = normalizar(document.getElementById('inputBusca').value);
        
        // O Firebase lerá automaticamente do cache se estiver offline[cite: 6]
        refPrecos.on('value', (snap) => {
            const container = document.getElementById('lista-organizada');
            
            if(!snap.exists()) {
                container.innerHTML = "<p style='text-align:center; font-size:12px; color:gray;'>Aguardando sincronização ou sem dados...</p>";
                return;
            }

            container.innerHTML = "";
            const produtos = [];
            snap.forEach(s => { 
                let p = s.val(); 
                p.id = s.key; 
                const nomeNorm = normalizar(p.nome);
                const catNorm = normalizar(p.categoria || "");
                if(nomeNorm.includes(busca) || catNorm.includes(busca)) {
                    produtos.push(p);
                }
            });

            const datalist = document.getElementById('sugestoes-cat');
            const todasCats = [...new Set(produtos.map(p => p.categoria || "GERAL"))];
            datalist.innerHTML = todasCats.map(c => `<option value="${c}">`).join('');

            todasCats.sort().forEach(cat => {
                const displayDelCat = (sessaoAdmin && cat !== "GERAL") ? 'inline' : 'none';
                let htmlSet = `<div class="cat-wrapper"><span class="categoria-label">${cat}</span><button class="btn-del-cat" style="display:${displayDelCat}" onclick="limparCategoria('${cat}')">🗑️ Limpar</button></div><div class="card">`;
                const produtosDaCat = produtos.filter(p => (p.categoria || "GERAL") === cat);
                
                produtosDaCat.forEach(p => {
                    const displayActions = sessaoAdmin ? 'flex' : 'none';
                    htmlSet += `<div class="item-row"><div class="item-info"><b>${p.nome}</b><span>R$ ${parseFloat(p.preco).toFixed(2)}</span></div><div class="actions" style="display:${displayActions}"><button class="btn-action" onclick="editarItem('${p.id}','${p.nome}','${p.preco}','${p.categoria}')">✏️</button><button class="btn-action" onclick="removerItem('${p.id}')">❌</button></div></div>`;
                });
                htmlSet += `</div>`;
                container.innerHTML += htmlSet;
            });
        }, (error) => {
            console.error("Erro no Firebase:", error);
        });
    }
    // ... (restante das funções: salvarItem, editarItem, removerItem permanecem iguais)
    renderLista();
</script>
